name: CI

# Push em qualquer branch + PRs para qualquer branch base (não só main).
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Lint, test e build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Testes (Vitest)
        run: npm run test

      - name: Typecheck e build (tsc + Vite)
        run: npm run build
